# Decap CMS config — git-based (GitHub) backend
# NOTE: neeche 3 jagah apni value daalein: repo, branch, base_url
backend:
  name: github
  repo: igjitendra/dailyposterhub      # <-- apna GitHub owner/repo (jaise username/repo-name)
  branch: main                       # <-- apni default branch
  base_url: https://posterhub.pages.dev   # <-- apna LIVE domain (OAuth ke liye)
  auth_endpoint: auth

# Site language
locale: 'en'

# Decap jo images upload karega wo repo me yahan jaayengi
media_folder: "public/img/blog"
public_folder: "/img/blog"

publish_mode: simple

collections:
  - name: "blog"
    label: "ब्लॉग पोस्ट"
    label_singular: "पोस्ट"
    folder: "src/content/blog"
    create: true
    slug: "{{fields.slug}}"
    summary: "{{title}}"
    sortable_fields: ["date", "title"]
    fields:
      - { name: "title", label: "शीर्षक (H1 / Title)", widget: "string" }
      - {
          name: "slug",
          label: "Slug — Custom URL",
          widget: "string",
          hint: "अंग्रेज़ी में, - से जोड़ें। जैसे: diwali-poster-tips — यही पेज का लिंक /blog/... बनेगा।"
        }
      - { name: "date", label: "तारीख़", widget: "datetime" }
      - { name: "author", label: "लेखक (Author)", widget: "string", default: "Daily PosterHub Team" }
      - {
          name: "tag",
          label: "श्रेणी",
          widget: "select",
          options: ["टिप्स", "गाइड", "फेस्टिवल", "न्यूज़", "बिज़नेस"],
          default: "टिप्स"
        }
      - { name: "cover", label: "फ़ीचर्ड इमेज (Featured Image)", widget: "image", required: false }
      - { name: "excerpt", label: "छोटा विवरण (कार्ड पर दिखेगा)", widget: "text", required: false }

      # ---------- SEO ----------
      - {
          name: "seoTitle",
          label: "SEO Title (Google में दिखने वाला title)",
          widget: "string",
          required: false,
          hint: "खाली छोड़ें तो शीर्षक ही इस्तेमाल होगा। 55-60 अक्षर बेहतर।"
        }
      - {
          name: "metaDescription",
          label: "Meta Description",
          widget: "text",
          required: false,
          hint: "Google result में दिखने वाला विवरण। 150-160 अक्षर।"
        }
      - {
          name: "canonical",
          label: "Canonical URL (optional)",
          widget: "string",
          required: false,
          hint: "सिर्फ़ तब भरें जब यही कंटेंट कहीं और भी published हो।"
        }
      - { name: "toc", label: "Table of Contents (विषय-सूची) दिखाएं", widget: "boolean", default: true }
      - name: "faqs"
        label: "FAQ (Google FAQ Schema बनेगा)"
        label_singular: "सवाल"
        widget: "list"
        required: false
        fields:
          - { name: "question", label: "सवाल", widget: "string" }
          - { name: "answer", label: "जवाब", widget: "text" }
      # -------------------------

      - { name: "draft", label: "ड्राफ्ट रखें (publish न करें)", widget: "boolean", default: false }
      - { name: "body", label: "कंटेंट", widget: "markdown" }
